name: Build APK

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

# Default to read-only; the publish job opts up to contents: write explicitly.
permissions:
  contents: read

jobs:
  # Unsigned build + tests for pull requests. No secrets are referenced here, so a PR
  # from a fork can never access signing material.
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest --stacktrace

      - name: Assemble release APK (unsigned / debug-signed, no secrets)
        run: ./gradlew assembleRelease --stacktrace

  # Signed APK publish for pushes to master and version tags. Opts up to
  # contents: write so the tag job can create a GitHub Release.
  publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Decode release keystore (if configured)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "present=true" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # A published release MUST carry the stable upload key; refuse to ship a
            # tag build signed with the ephemeral per-runner debug key (unstable
            # signature => users cannot upgrade in place without uninstalling).
            echo "::error::Tag build with no KEYSTORE_BASE64 secret — refusing to publish a debug-signed release."
            exit 1
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No KEYSTORE_BASE64 secret set — non-tag build will be debug-signed (still installable)."
          fi

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest --stacktrace

      - name: Derive version name from tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
            echo "Using tag-derived VERSION_NAME=${GITHUB_REF_NAME#v}"
          fi

      - name: Assemble release APK (sideload)
        env:
          VERSION_CODE: ${{ github.run_number }}
          KEYSTORE_FILE: ${{ steps.keystore.outputs.present == 'true' && format('{0}/release.keystore', runner.temp) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/wifi-heatmap-surveyor-${GITHUB_SHA::7}.apk"
          ls -l dist

      - name: Upload APK artifact (sideload)
        uses: actions/upload-artifact@v4
        with:
          name: wifi-heatmap-surveyor-apk
          path: dist/*.apk
          if-no-files-found: error

      - name: Publish release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
